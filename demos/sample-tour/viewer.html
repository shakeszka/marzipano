<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Tour Viewer | Marzipano</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #viewer {
      width: 100%;
      height: 100vh;
    }
    #loadStatus {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 20px 40px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 1000;
    }
    .hotspot {
      cursor: pointer;
    }
    .hotspot-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hotspot-icon {
      width: 40px;
      height: 40px;
      background: rgba(100, 150, 255, 0.7);
      border-radius: 50%;
      border: 2px solid rgba(200, 220, 255, 0.9);
      position: relative;
    }
    .hotspot-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 12px solid rgba(200, 220, 255, 0.9);
    }
    .hotspot-title {
      background: rgba(100, 100, 100, 0.8);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="loadStatus">Loading tour...</div>

  <script src="/build/marzipano.js"></script>
  <script src="/builder/js/viewer.js"></script>
  <script>
    (function() {
      function getTourId() {
        var match = window.location.pathname.match(/^\/([0-9a-fA-F-]{36})\/tour\/?$/);
        if (match) {
          return match[1];
        }
        var params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      var tourId = getTourId();

      if (!tourId) {
        document.getElementById('loadStatus').textContent = 'No tour ID provided.';
        return;
      }

      // Setup viewer
      DynamicTourViewer.setupViewer('viewer');

      // Load and display tour
      DynamicTourViewer.loadTourFromUrl(tourId)
        .then(function(tourData) {
          DynamicTourViewer.buildTourFromData(tourData);
        })
        .catch(function(error) {
          console.error('Error loading tour:', error);
          document.getElementById('loadStatus').textContent = 'Error loading tour: ' + error.message;
        });
    })();
  </script>
</body>
</html>
