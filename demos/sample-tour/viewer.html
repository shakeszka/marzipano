<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Tour Viewer | Marzipano</title>
  <link rel="stylesheet" href="/demos/sample-tour/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #viewer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 0;
    }
    #titleBar {
      position: absolute;
      top: 0;
      left: 0;
      right: 40px;
      height: 40px;
      margin: 0;
      padding: 0;
      z-index: 1001;
    }
    #sceneList, #sceneListToggle {
      z-index: 1001;
    }
    #titleBar .sceneName {
      margin: 0;
      padding: 5px;
      line-height: 30px;
      height: 100%;
      font-size: 16px;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      width: 100%;
    }
    #autorotateToggle,
    #fullscreenToggle,
    .viewControlButton {
      position: absolute;
      z-index: 1001;
    }
    #fullscreenToggle {
      display: block;
      top: 0;
      right: 0;
      width: 40px;
      height: 40px;
      padding: 5px;
      background-color: rgba(103,115,131,0.8);
    }
    #autorotateToggle {
      display: block;
      top: 0;
      right: 40px;
      width: 40px;
      height: 40px;
      padding: 5px;
      background-color: rgba(103,115,131,0.8);
    }
    #loadStatus {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 20px 40px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 1002;
    }
    .hotspot {
      cursor: pointer;
    }
    .hotspot-link {
      width: 60px;
      height: 60px;
      margin-left: -30px;
      margin-top: -30px;
      opacity: 0.95;
      position: relative;
    }
    .hotspot-link .hotspot-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(60, 60, 60, 0.75);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 0 auto;
      position: relative;
    }
    .hotspot-link .hotspot-icon::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 14px solid #fff;
    }
    .hotspot-link .hotspot-icon::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 10px;
      background: #fff;
      border-radius: 2px;
    }
    .hotspot-title {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 10px;
      padding: 8px 12px;
      background: rgba(60, 60, 60, 0.85);
      color: #fff;
      border-radius: 8px;
      white-space: nowrap;
      font-size: 15px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      line-height: 1.2;
      pointer-events: none;
      z-index: 1;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="sceneList">
    <ul class="scenes"></ul>
  </div>

  <div id="titleBar"><h1 class="sceneName"></h1></div>
  <a href="javascript:void(0)" id="autorotateToggle">
    <img class="icon off" src="/demos/sample-tour/img/play.png">
    <img class="icon on" src="/demos/sample-tour/img/pause.png">
  </a>
  <a href="javascript:void(0)" id="fullscreenToggle">
    <img class="icon off" src="/demos/sample-tour/img/fullscreen.png">
    <img class="icon on" src="/demos/sample-tour/img/windowed.png">
  </a>
  <a href="javascript:void(0)" id="sceneListToggle">
    <img class="icon off" src="/demos/sample-tour/img/expand.png">
    <img class="icon on" src="/demos/sample-tour/img/collapse.png">
  </a>
  <a href="javascript:void(0)" id="viewUp" class="viewControlButton viewControlButton-1">
    <img class="icon" src="/demos/sample-tour/img/up.png">
  </a>
  <a href="javascript:void(0)" id="viewDown" class="viewControlButton viewControlButton-2">
    <img class="icon" src="/demos/sample-tour/img/down.png">
  </a>
  <a href="javascript:void(0)" id="viewLeft" class="viewControlButton viewControlButton-3">
    <img class="icon" src="/demos/sample-tour/img/left.png">
  </a>
  <a href="javascript:void(0)" id="viewRight" class="viewControlButton viewControlButton-4">
    <img class="icon" src="/demos/sample-tour/img/right.png">
  </a>
  <a href="javascript:void(0)" id="viewIn" class="viewControlButton viewControlButton-5">
    <img class="icon" src="/demos/sample-tour/img/plus.png">
  </a>
  <a href="javascript:void(0)" id="viewOut" class="viewControlButton viewControlButton-6">
    <img class="icon" src="/demos/sample-tour/img/minus.png">
  </a>
  <div id="viewer"></div>
  <div id="loadStatus">Loading tour...</div>

  <script src="//www.marzipano.net/demos/common/screenfull.js"></script>
  <script src="/build/marzipano.js"></script>
  <script src="/demos/tour-builder/js/viewer.js"></script>
  <script>
    (function() {
      function getTourId() {
        var match = window.location.pathname.match(/^\/([0-9a-fA-F-]{36})\/tour\/?$/);
        if (match) {
          return match[1];
        }
        var params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      var tourId = getTourId();

      if (!tourId) {
        document.getElementById('loadStatus').textContent = 'No tour ID provided.';
        return;
      }

      // Setup viewer
      DynamicTourViewer.setupViewer('viewer');

      // Load and display tour
      DynamicTourViewer.loadTourFromUrl(tourId)
        .then(function(tourData) {
          DynamicTourViewer.buildTourFromData(tourData);
        })
        .catch(function(error) {
          console.error('Error loading tour:', error);
          document.getElementById('loadStatus').textContent = 'Error loading tour: ' + error.message;
        });
    })();
  </script>
</body>
</html>
